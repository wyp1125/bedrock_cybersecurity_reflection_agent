# config.yaml
version: "1.0"

project:
  name: "cybersecurity-reflection-agent"
  environment: "production"

infrastructure:
  aws_region: "us-east-1"
  terraform_backend:
    s3_bucket: "bdx-agentic-ai"
    state_key: "terraform/cybersecurity.reflection.terraform.tfstate"
    test_state_key: "terraform/test.terraform.tfstate"
    encrypt: true
  agentcore_deployment:
    staging_bucket: "bdx-agentic-ai"
    staging_prefix: "agents/cybersecurity-reflection-agent"

agent_runtime:
  agent_name: "nist_mapping_reflection_agent"
  model_id: "us.anthropic.claude-sonnet-4-6"
  max_reflection_rounds: 5
  timeout_seconds: 120