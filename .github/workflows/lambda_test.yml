# .github/workflows/lambda_test.yml
name: Terraform Lambda Test Deploy

on:
  workflow_dispatch: 

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Base
# ... (Keep your checkout, AWS credentials, and setup-terraform steps exactly the same)

    - name: Initialize and Apply Test Stack
      run: |
        BUCKET=$(grep 's3_bucket:' config.yaml | awk -F'"' '{print $2}')
        TEST_KEY=$(grep 'test_state_key:' config.yaml | awk -F'"' '{print $2}')
        REGION=$(grep 'aws_region:' config.yaml | awk -F'"' '{print $2}')
        
        cd infra_test
        
        terraform init \
          -backend-config="bucket=${BUCKET}" \
          -backend-config="key=${TEST_KEY}" \
          -backend-config="region=${REGION}"
          
        terraform apply -auto-approve

        # -----------------------------------------------------------------------------
        # File-Based Parsing: Bypasses Terraform Wrapper Binary Completely
        # -----------------------------------------------------------------------------
        echo "[INFO] Extracting Agent ID directly from local state file structure..."
        
        # Read directly from the tfstate file on disk to avoid wrapper pollution
        AGENT_ID=$(jq -r '.resources[] | select(.type=="aws_bedrockagent_agent") | .instances[0].attributes.id // empty' terraform.tfstate)

        if [ ! -z "$AGENT_ID" ] && [ "$AGENT_ID" != "null" ]; then
          echo "[INFO] Successfully target locked Bedrock Agent ID: ${AGENT_ID}"
          echo "[EXEC] Triggering asynchronous agent compilation pipeline..."
          aws bedrock-agent prepare-agent --agent-id "$AGENT_ID" --region "$REGION"
          echo "[SUCCESS] Agent snapshot built. Ready for canary traffic routing."
        else
          echo "[WARNING] Could not find active Bedrock Agent resource attributes inside the state file."
        fi