# .github/workflows/lambda_test.yml
name: Terraform Lambda Test Deploy

on:
  workflow_dispatch: 

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4

    - name: Configure AWS Credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::925680695682:role/github-actions-bedrock-agent-role
        aws-region: us-east-1

    - name: Setup Terraform Control Plane
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.5.7"

    - name: Initialize and Apply Test Stack
      run: |
        BUCKET=$(grep 's3_bucket:' config.yaml | awk -F'"' '{print $2}')
        TEST_KEY=$(grep 'test_state_key:' config.yaml | awk -F'"' '{print $2}')
        REGION=$(grep 'aws_region:' config.yaml | awk -F'"' '{print $2}')
        
        cd infra_test
        
        terraform init \
          -backend-config="bucket=${BUCKET}" \
          -backend-config="key=${TEST_KEY}" \
          -backend-config="region=${REGION}"
          
        terraform apply -auto-approve

        # -----------------------------------------------------------------------------
        # Robust Post-Deployment Step: Pure JSON Parsing
        # -----------------------------------------------------------------------------
        echo "[INFO] Fetching newly created Agent ID from local state file..."
        
        # Pull using ONLY -json, then let jq extract the raw value cleanly
        AGENT_ID=$(terraform output -json | jq -r '.agent_id.value // empty')
        
        # Fallback tracking loop to search the state resources directly if the output isn't declared
        if [ -z "$AGENT_ID" ]; then
          AGENT_ID=$(terraform show -json | jq -r '.values.root_module.resources[]? | select(.type=="aws_bedrockagent_agent") | .values.id // empty' 2>/dev/null || true)
        fi

        if [ ! -z "$AGENT_ID" ] && [ "$AGENT_ID" != "null" ]; then
          echo "[INFO] Successfully target locked Bedrock Agent ID: ${AGENT_ID}"
          echo "[EXEC] Triggering asynchronous agent compilation pipeline..."
          aws bedrock-agent prepare-agent --agent-id "$AGENT_ID" --region "$REGION"
          echo "[SUCCESS] Agent snapshot built. Ready for canary traffic routing."
        else
          echo "[WARNING] Could not extract active Agent ID for automated compilation setup."
        fi