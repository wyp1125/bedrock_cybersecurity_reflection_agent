name: Deploy NIST Mapping Reflection Agent

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::925680695682:role/github-actions-bedrock-agent-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Show Terraform version
        run: terraform version

      #
      # Optional: automatically format instead of failing
      #
      - name: Terraform Format
        working-directory: src/infra
        run: terraform fmt -recursive

      - name: Initialize and Apply Test Stack
        run: |
          BUCKET=$(grep 's3_bucket:' config.yaml | awk -F'"' '{print $2}')
          STATE_KEY=$(grep 'state_key:' config.yaml | awk -F'"' '{print $2}')
          REGION=${{ env.AWS_REGION }}
        
          cd src/infra
        
          terraform init \
          -backend-config="bucket=${BUCKET}" \
          -backend-config="key=${STATE_KEY}" \
          -backend-config="region=${REGION}"
        
      - name: Terraform Validate
        working-directory: src/infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: src/infra
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: src/infra
        run: terraform apply -auto-approve tfplan
        env:
            TF_LOG: INFO

      - name: Terraform Outputs
        working-directory: src/infra
        run: terraform output

      - name: Display Agent Runtime Information
        working-directory: src/infra
        run: |
          echo "Agent Runtime ARN:"
          terraform output -raw agent_runtime_arn || true

          echo "Agent Runtime ID:"
          terraform output -raw agent_runtime_id || true

          echo "Lambda Function:"
          terraform output -raw lambda_function_name || true